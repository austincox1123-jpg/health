name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workout-app/package-lock.json
      - run: npm ci
        working-directory: workout-app
      - run: npm run build
        working-directory: workout-app
      # SPA fallback so deep links like /health/plan resolve on Pages
      - run: cp workout-app/dist/index.html workout-app/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: workout-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
